name: Build & Release APK

on:
  push:
    branches:
      - "claude/**"
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SIGNING_KEYSTORE_BASE64:-}" ] && missing="$missing SIGNING_KEYSTORE_BASE64"
          [ -z "${SIGNING_STORE_PASSWORD:-}" ] && missing="$missing SIGNING_STORE_PASSWORD"
          [ -z "${SIGNING_KEY_PASSWORD:-}" ] && missing="$missing SIGNING_KEY_PASSWORD"
          [ -z "${SIGNING_KEY_ALIAS:-}" ] && missing="$missing SIGNING_KEY_ALIAS"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:$missing. See SIGNING.md to generate the keystore and set secrets."
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing-keystore.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing-keystore.jks" >> "$GITHUB_ENV"
          echo "Signing keystore decoded; all four signing secrets present."

      - name: Run unit tests and assemble debug APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          # versionCode is monotonic across re-runs of the same run_number:
          # run #50 attempt 1 -> 5001, attempt 2 -> 5002, etc.
          VERSION_CODE=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          ./gradlew testDebugUnitTest assembleDebug \
            -PversionCode="$VERSION_CODE" \
            -PversionName="1.0.${{ github.run_number }}" \
            --stacktrace

      - name: Verify APK declares no network permissions
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::Expected APK not found at $APK"
            exit 1
          fi
          AAPT2="$(find "$ANDROID_SDK_ROOT/build-tools" -name aapt2 -type f | sort -V | tail -n1)"
          echo "Using aapt2: $AAPT2"
          PERMISSIONS="$("$AAPT2" dump permissions "$APK")"
          echo "----- Declared permissions -----"
          echo "$PERMISSIONS"
          echo "--------------------------------"
          if echo "$PERMISSIONS" | grep -E 'android\.permission\.(INTERNET|ACCESS_NETWORK_STATE)'; then
            echo "::error::APK declares a network permission. This app must be fully offline."
            exit 1
          fi
          echo "OK: APK declares no INTERNET or ACCESS_NETWORK_STATE permission."

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}.${{ github.run_attempt }}
          name: Build ${{ github.run_number }}
          body: "Debug build ${{ github.run_number }}."
          files: app/build/outputs/apk/debug/app-debug.apk
