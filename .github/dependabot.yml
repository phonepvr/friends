version: 2
updates:
  # Gradle deps: security advisories only. Setting
  # `open-pull-requests-limit: 0` disables Dependabot's routine
  # version-bump PRs (which were noisy for a personal app where the
  # current versions all work) while leaving the door open for
  # GitHub-issued security alerts — those always create a PR
  # regardless of the limit.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 0
    labels: ["dependencies", "gradle", "security"]
    commit-message:
      prefix: "deps"
      include: scope

  # Same posture for GitHub Actions — only security advisories make
  # a PR; major-version bumps require an explicit "go" from us.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 0
    labels: ["dependencies", "actions", "security"]
    commit-message:
      prefix: "deps(actions)"
      include: scope
