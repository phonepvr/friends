name: Generate signing keystore

# Generates the app-signing keystore and hands it back to you ENCRYPTED.
#
# Why encrypted: this is a public repository, and GitHub Actions artifacts on
# a public repo are downloadable by third parties. The previous version of
# this workflow uploaded the raw keystore and a plaintext-password file as an
# artifact, which exposed the signing key for the artifact's lifetime. We now
# seal everything with a passphrase only you hold (the KEYSTORE_EXPORT_PASSPHRASE
# secret) and upload only the ciphertext, so the artifact is useless to anyone
# else. See SIGNING.md.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and encrypt the credential bundle
        env:
          # Set this repository secret (a strong passphrase) before running.
          EXPORT_PASSPHRASE: ${{ secrets.KEYSTORE_EXPORT_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${EXPORT_PASSPHRASE:-}" ]; then
            echo "::error::Set a repository secret named KEYSTORE_EXPORT_PASSPHRASE (a strong, random passphrase) before running this workflow. The keystore bundle is encrypted with it so the uploaded artifact is safe to leave on a public repo. See SIGNING.md."
            exit 1
          fi

          # Random keystore password. GitHub auto-masks secret values, but this
          # one is generated at runtime, so mask it explicitly so it can never
          # surface in logs or the step summary.
          STORE_PASS="$(openssl rand -base64 30 | tr -d '/+=' | head -c 32)"
          KEY_PASS="$STORE_PASS"
          ALIAS="bondwidth"
          echo "::add-mask::$STORE_PASS"

          KEYSTORE="$RUNNER_TEMP/signing-keystore.jks"
          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 36500 \
            -storetype JKS \
            -keystore "$KEYSTORE" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Bondwidth, OU=Personal"

          # Stage the cleartext bundle in a scratch dir that is NEVER uploaded.
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE"
          base64 -w 0 "$KEYSTORE" > "$STAGE/signing-keystore.b64"

          cat > "$STAGE/credentials.txt" <<EOF
          # Bondwidth signing-keystore credentials
          # Generated $(date -u +"%Y-%m-%dT%H:%M:%SZ") by run ${{ github.run_id }}
          #
          # Set all four values as GitHub repository secrets
          # (Settings -> Secrets and variables -> Actions).

          SIGNING_KEYSTORE_BASE64=<paste the entire contents of signing-keystore.b64>
          SIGNING_STORE_PASSWORD=$STORE_PASS
          SIGNING_KEY_PASSWORD=$KEY_PASS
          SIGNING_KEY_ALIAS=$ALIAS

          # CRITICAL: also save these in a password manager. Losing the keystore
          # or its passwords means losing the ability to publish updates to the
          # installed app. See SIGNING.md.
          EOF

          # Seal the bundle. -pbkdf2 with a high iteration count makes an
          # offline guess against the (public) ciphertext expensive, so the
          # whole scheme rests on the passphrase being strong.
          mkdir -p "$RUNNER_TEMP/out"
          tar -C "$STAGE" -cf "$RUNNER_TEMP/bundle.tar" signing-keystore.b64 credentials.txt
          openssl enc -aes-256-cbc -pbkdf2 -iter 600000 -salt \
            -in "$RUNNER_TEMP/bundle.tar" \
            -out "$RUNNER_TEMP/out/keystore-bundle.enc" \
            -pass env:EXPORT_PASSPHRASE

          # Destroy every cleartext copy before the upload step runs, so there
          # is no window in which a plaintext key/credential could be collected.
          shred -u "$KEYSTORE" "$STAGE/signing-keystore.b64" \
            "$STAGE/credentials.txt" "$RUNNER_TEMP/bundle.tar" 2>/dev/null || \
            rm -f "$KEYSTORE" "$STAGE/signing-keystore.b64" \
            "$STAGE/credentials.txt" "$RUNNER_TEMP/bundle.tar"

          {
            echo "## Signing keystore generated (encrypted)"
            echo ""
            echo "Download the **signing-keystore-encrypted** artifact below. It holds a single AES-256-encrypted file, \`keystore-bundle.enc\`, sealed with your \`KEYSTORE_EXPORT_PASSPHRASE\`. It is safe to leave on a public repo — it is useless without that passphrase."
            echo ""
            echo "Decrypt it locally (avoids putting the passphrase in shell history):"
            echo ""
            echo '```sh'
            echo "read -rs EXPORT_PASSPHRASE && export EXPORT_PASSPHRASE   # type your passphrase"
            echo "openssl enc -d -aes-256-cbc -pbkdf2 -iter 600000 \\"
            echo "  -in keystore-bundle.enc -out bundle.tar -pass env:EXPORT_PASSPHRASE"
            echo "tar xf bundle.tar"
            echo '```'
            echo ""
            echo "That yields \`signing-keystore.b64\` and \`credentials.txt\`. Set the four signing secrets from them (SIGNING.md step B)."
            echo ""
            echo "**Save the decrypted values in your password manager before the artifact expires.**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload encrypted keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore-encrypted
          path: ${{ runner.temp }}/out/
          retention-days: 7
