distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
# SHA-256 of gradle-8.11.1-bin.zip, from gradle.org/release-checksums. The
# wrapper refuses to run if the downloaded distribution doesn't match, so a
# tampered or MITM'd Gradle build can't slip in. (The wrapper JAR itself is
# already validated in CI by gradle/actions/setup-gradle, whose
# validate-wrappers input defaults to true.)
distributionSha256Sum=f397b287023acdba1e9f6fc5ea72d22dd63669d59ed4a289a29b1a76eee151c6
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
