name: CodeQL

# Static analysis (GitHub-hosted, free). Catches common security
# bugs — injection, hardcoded secrets, unsafe deserialisation,
# weak crypto, etc. — at PR / push time, before they reach a build.

on:
  push:
    branches: ["claude/**", "main"]
  pull_request:
    branches: ["claude/**", "main"]
  schedule:
    # Weekly catch-up so newly-published rules pick up old code too.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # Caches the Gradle distribution + dependencies and is resilient to the
      # flaky gradle-distributions CDN. Without it the wrapper re-downloaded
      # Gradle every run and intermittently failed on a 504, which surfaced as
      # a CodeQL "configuration error" rather than a real analysis result.
      # Mirrors the main build workflow (build.yml).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          # Clean, cache-free compile so CodeQL's build tracer always observes
          # real kotlinc/javac invocations. With a restored Gradle build cache,
          # assembleDebug can resolve entirely from cache (no compilation runs),
          # leaving CodeQL with an empty database and a "configuration error"
          # instead of a real analysis result. -x test keeps it to the fastest
          # compile-only path; clean + --no-build-cache force actual compilation.
          ./gradlew clean assembleDebug -x test --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
