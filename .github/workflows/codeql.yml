name: CodeQL

# Static analysis (GitHub-hosted, free). Catches common security
# bugs — injection, hardcoded secrets, unsafe deserialisation,
# weak crypto, etc. — at PR / push time, before they reach a build.

on:
  push:
    branches: ["claude/**", "main"]
  pull_request:
    branches: ["claude/**", "main"]
  schedule:
    # Weekly catch-up so newly-published rules pick up old code too.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build with Gradle
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          # No tests / no signing — just compile, fastest path for analysis.
          ./gradlew assembleDebug -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
