name: Release APK (signed)

# Builds and publishes the SIGNED release-variant APK for a clean vX.Y.Z tag.
# This is the binary F-Droid reproduces against: with `Binaries` +
# `AllowedAPKSigningKeys` in the fdroiddata recipe, F-Droid builds the same
# tagged source UNSIGNED, byte-compares it to this APK, and then ships OUR
# signature so F-Droid and GitHub-sideload installs update over each other.
#
# Clean release tags only — the experimental `v1.0.0-build.<N>` tags are handled
# by build.yml and deliberately never trigger this. Use the manual trigger
# (Run workflow → pick the vX.Y.Z tag) to (re)publish the APK for an existing tag.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEYSTORE_BASE64:-}" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set — see SIGNING.md"; exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing-keystore.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing-keystore.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          # Deliberately NOT setting APP_VERSION_CODE / APP_VERSION_NAME: the
          # committed literals are used, so this APK is the exact version
          # (e.g. versionCode 1 / versionName 1.0.0) F-Droid builds and reproduces.
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Stage APK named by versionName
        id: stage
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SRC="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected a SIGNED APK at $SRC. Is the keystore configured? Found:"; ls -R app/build/outputs/apk || true; exit 1
          fi
          OUT="Bondwidth-${VERSION}.apk"
          cp "$SRC" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Print signing certificate SHA-256 (for AllowedAPKSigningKeys)
        run: |
          set -euo pipefail
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n1)"
          echo "Use this (lowercase hex, no colons) as AllowedAPKSigningKeys:"
          "$APKSIGNER" verify --print-certs "${{ steps.stage.outputs.apk }}" | grep -i "SHA-256" || true

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          files: ${{ steps.stage.outputs.apk }}
          fail_on_unmatched_files: true
