name: Generate signing keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and credentials
        run: |
          set -euo pipefail

          STORE_PASS="$(openssl rand -base64 30 | tr -d '/+=' | head -c 32)"
          KEY_PASS="$STORE_PASS"
          ALIAS="friends"

          # Mask the password in case it ever leaks into later log output.
          echo "::add-mask::$STORE_PASS"

          KEYSTORE="$RUNNER_TEMP/signing-keystore.jks"
          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 36500 \
            -storetype JKS \
            -keystore "$KEYSTORE" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Friends, OU=Personal, O=phonepvr, L=Local, ST=Local, C=US"

          mkdir -p "$RUNNER_TEMP/out"
          base64 -w 0 "$KEYSTORE" > "$RUNNER_TEMP/out/signing-keystore.b64"

          cat > "$RUNNER_TEMP/out/credentials.txt" <<EOF
          # Friends signing-keystore credentials
          # Generated $(date -u +"%Y-%m-%dT%H:%M:%SZ") by run ${{ github.run_id }}
          #
          # Set all four values as GitHub repository secrets
          # (Settings -> Secrets and variables -> Actions).

          SIGNING_KEYSTORE_BASE64=<paste the entire contents of signing-keystore.b64>
          SIGNING_STORE_PASSWORD=$STORE_PASS
          SIGNING_KEY_PASSWORD=$KEY_PASS
          SIGNING_KEY_ALIAS=$ALIAS

          # CRITICAL: also save these in a password manager. Losing the keystore
          # or its passwords means losing the ability to publish updates to the
          # installed app. See SIGNING.md.
          EOF

          {
            echo "## Signing keystore generated"
            echo ""
            echo "Download the **signing-keystore** artifact below; it contains:"
            echo ""
            echo "- \`signing-keystore.b64\` — value for the \`SIGNING_KEYSTORE_BASE64\` secret"
            echo "- \`credentials.txt\` — password and alias values"
            echo ""
            echo "Set these four secrets under **Settings → Secrets and variables → Actions**:"
            echo ""
            echo "| Secret | Value |"
            echo "| --- | --- |"
            echo "| \`SIGNING_KEYSTORE_BASE64\` | (paste the entire contents of signing-keystore.b64) |"
            echo "| \`SIGNING_STORE_PASSWORD\` | \`$STORE_PASS\` |"
            echo "| \`SIGNING_KEY_PASSWORD\` | \`$KEY_PASS\` |"
            echo "| \`SIGNING_KEY_ALIAS\` | \`$ALIAS\` |"
            echo ""
            echo "**Save these values in your password manager before this artifact expires.** Losing them = losing the ability to update the installed app."
            echo ""
            echo "Next: follow \`SIGNING.md\` step D to migrate the on-device install."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: ${{ runner.temp }}/out/
          retention-days: 7
