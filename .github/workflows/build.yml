name: Build & Release APK

on:
  push:
    branches:
      - "claude/relaxed-lovelace-tUm0M"
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing keystore (optional)
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing-keystore.jks"
            echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing-keystore.jks" >> "$GITHUB_ENV"
            echo "Signing keystore configured from a repository secret."
          else
            echo "No signing secret set; the debug APK will use an ephemeral key."
          fi

      - name: Run unit tests and assemble debug APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Verify APK declares no network permissions
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::Expected APK not found at $APK"
            exit 1
          fi
          AAPT2="$(find "$ANDROID_SDK_ROOT/build-tools" -name aapt2 -type f | sort -V | tail -n1)"
          echo "Using aapt2: $AAPT2"
          PERMISSIONS="$("$AAPT2" dump permissions "$APK")"
          echo "----- Declared permissions -----"
          echo "$PERMISSIONS"
          echo "--------------------------------"
          if echo "$PERMISSIONS" | grep -E 'android\.permission\.(INTERNET|ACCESS_NETWORK_STATE)'; then
            echo "::error::APK declares a network permission. This app must be fully offline."
            exit 1
          fi
          echo "OK: APK declares no INTERNET or ACCESS_NETWORK_STATE permission."

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}.${{ github.run_attempt }}
          name: Build ${{ github.run_number }}
          body: "Debug build ${{ github.run_number }}."
          files: app/build/outputs/apk/debug/app-debug.apk
